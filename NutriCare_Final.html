<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriCare - The Premium Health Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6', // Deep Teal / Emerald hybrid
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        },
                        accent: {
                            blue: '#3b82f6',
                            purple: '#8b5cf6',
                            rose: '#f43f5e',
                            amber: '#f59e0b'
                        }
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <style>
        body {
            font-family: 'SF Pro Display', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.5s ease;
        }

        /* Ambient Premium Background */
        .bg-ambient-light {
            background: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(162,100%,76%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(253,100%,76%,0.15) 0px, transparent 50%);
        }
        .bg-ambient-dark {
            background: #09090b; /* Very dark zinc */
            background-image: 
                radial-gradient(at 0% 0%, hsla(162,100%,26%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(253,100%,26%,0.15) 0px, transparent 50%);
        }

        /* Apple-style Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
        }
        
        .dark .glass-panel {
            background: rgba(24, 24, 27, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }
        .dark .glass-panel:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-nav {
            background: rgba(9, 9, 11, 0.8);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Typography Gradients */
        .text-gradient-premium {
            background: linear-gradient(135deg, #14b8a6 0%, #0284c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dark .text-gradient-premium {
            background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* SVG Circular Chart */
        .circular-chart {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 250px;
            transform: rotate(-90deg);
        }
        .circle-bg {
            fill: none;
            stroke-width: 3.8;
            stroke-linecap: round;
        }
        .circle {
            fill: none;
            stroke-width: 3.8;
            stroke-linecap: round;
            transition: stroke-dasharray 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }

        /* Fancy Buttons */
        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-premium::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: scale(0.5);
        }
        .btn-premium:hover::after {
            opacity: 1;
            transform: scale(1);
        }
        .btn-premium:active {
            transform: scale(0.98);
        }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-ambient-light dark:bg-ambient-dark text-slate-900 dark:text-slate-100 min-h-screen pb-20 sm:pb-0 sm:pl-72 overflow-x-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom SVG Area Chart for Insights (No 3rd party deps)
        const CustomAreaChart = ({ data }) => {
            const minWeight = Math.min(...data.map(d => d.weight)) - 0.5;
            const maxWeight = Math.max(...data.map(d => d.weight)) + 0.5;
            
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * 100;
                const y = 100 - ((d.weight - minWeight) / (maxWeight - minWeight)) * 100;
                return `${x},${y}`;
            });

            const pathData = `M 0,100 L ${points[0]} L ${points.join(' L ')} L 100,100 Z`;
            const lineData = `M ${points.join(' L ')}`;

            return (
                <div className="relative w-full h-full flex flex-col justify-end">
                    <svg className="w-full h-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#14b8a6" stopOpacity="0.4" />
                                <stop offset="100%" stopColor="#14b8a6" stopOpacity="0" />
                            </linearGradient>
                            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="2" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <path d={pathData} fill="url(#chartGradient)" className="transition-all duration-1000" />
                        <path d={lineData} fill="none" stroke="#14b8a6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)" className="transition-all duration-1000" />
                        {data.map((d, i) => {
                            const x = (i / (data.length - 1)) * 100;
                            const y = 100 - ((d.weight - minWeight) / (maxWeight - minWeight)) * 100;
                            return (
                                <g key={i} className="group cursor-pointer">
                                    <circle cx={x} cy={y} r="3" fill="#fff" stroke="#14b8a6" strokeWidth="2" className="transition-all duration-300 group-hover:r-5 group-hover:stroke-4" />
                                </g>
                            );
                        })}
                    </svg>
                    <div className="flex justify-between w-full mt-4 border-t border-gray-200 dark:border-gray-800 pt-2">
                        {data.map((d, i) => (
                            <span key={i} className="text-[11px] font-semibold text-gray-500">{d.name.replace('Week ', 'W')}</span>
                        ))}
                    </div>
                </div>
            );
        };

        // Icons
        const IconLogo = () => (
            <svg viewBox="0 0 40 40" className="w-10 h-10" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 5C11.7157 5 5 11.7157 5 20C5 28.2843 11.7157 35 20 35C28.2843 35 35 28.2843 35 20C35 11.7157 28.2843 5 20 5Z" fill="url(#paint0_linear)"/>
                <path d="M20 12C18.5 12 14 14.5 14 18.5C14 23 20 27 20 27C20 27 26 23 26 18.5C26 14.5 21.5 12 20 12Z" fill="white"/>
                <path d="M22 17C22 17 24 16 25 18" stroke="url(#paint1_linear)" strokeWidth="1.5" strokeLinecap="round"/>
                <defs>
                    <linearGradient id="paint0_linear" x1="5" y1="5" x2="35" y2="35" gradientUnits="userSpaceOnUse">
                        <stop stopColor="#2DD4BF"/>
                        <stop offset="1" stopColor="#0284C7"/>
                    </linearGradient>
                    <linearGradient id="paint1_linear" x1="22" y1="17" x2="25" y2="18" gradientUnits="userSpaceOnUse">
                        <stop stopColor="#2DD4BF"/>
                        <stop offset="1" stopColor="#0284C7"/>
                    </linearGradient>
                </defs>
            </svg>
        );

        const IconHome = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconCamera = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const IconMessage = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const IconUser = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconActivity = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const IconHeart = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
        const IconDroplet = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>;
        const IconSun = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const IconMoon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const IconFlame = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
        const IconShield = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;

        const App = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [view, setView] = useState('onboarding'); 
            const [showConfetti, setShowConfetti] = useState(false);
            
            // Premium tailored profile
            const [profile, setProfile] = useState({
                name: '', weight: '', height: '', age: '', gender: 'male', activity: 'light', goal: 'gain', conditions: '', digestion: 'sensitive'
            });
            const [goalsCalculated, setGoalsCalculated] = useState(false);
            
            // Daily Tracking State
            const [tracking, setTracking] = useState({
                calories: { current: 1850, max: 3200 },
                protein: { current: 95, max: 160 },
                carbs: { current: 210, max: 380 },
                fat: { current: 65, max: 100 },
                water: { current: 5, max: 10 },
                streak: 14,
                history: [
                    { id: 1, name: 'Oatmeal with Peanut Butter', cal: 650, protein: 20, time: '08:30 AM', tags: ['Easy Digestion'] },
                    { id: 2, name: 'Avocado Chicken Wrap', cal: 750, protein: 45, time: '01:15 PM', tags: ['Protein Rich'] },
                    { id: 3, name: 'Premium Mass Shake', cal: 450, protein: 30, time: '04:00 PM', tags: ['Liquid Calories'] }
                ]
            });

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            const handleProfileSubmit = (e) => {
                e.preventDefault();
                setGoalsCalculated(true);
                setTimeout(() => {
                    setTracking(prev => ({
                        ...prev,
                        calories: { current: 0, max: 3200 },
                        protein: { current: 0, max: 160 }
                    }));
                    setView('dashboard');
                }, 2800);
            };

            const addWater = () => {
                if(tracking.water.current < tracking.water.max) {
                    setTracking(prev => ({ ...prev, water: { ...prev.water, current: prev.water.current + 1 } }));
                    if (tracking.water.current + 1 === tracking.water.max) {
                        triggerConfetti();
                    }
                }
            };

            const triggerConfetti = () => {
                setShowConfetti(true);
                setTimeout(() => setShowConfetti(false), 3000);
            };

            return (
                <div className="w-full h-full max-w-[1600px] mx-auto">
                    {/* Background animated blobs */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-400/20 mix-blend-multiply filter blur-[100px] animate-blob"></div>
                        <div className="absolute top-[20%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-400/20 mix-blend-multiply filter blur-[100px] animate-blob" style={{animationDelay: "2s"}}></div>
                        <div className="absolute bottom-[-20%] left-[20%] w-[40%] h-[40%] rounded-full bg-purple-400/20 mix-blend-multiply filter blur-[100px] animate-blob" style={{animationDelay: "4s"}}></div>
                    </div>

                    {showConfetti && (
                        <div className="fixed inset-0 pointer-events-none z-[100] flex items-center justify-center bg-white/10 backdrop-blur-sm">
                            <div className="text-8xl animate-bounce drop-shadow-2xl">🎉✨💧</div>
                        </div>
                    )}

                    {/* Desktop Sidebar */}
                    <aside className="hidden sm:flex flex-col w-72 h-screen fixed left-0 top-0 glass-nav z-50">
                        <div className="p-8 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <IconLogo />
                                <h1 className="text-2xl font-bold tracking-tight text-gradient-premium">NutriCare</h1>
                            </div>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition">
                                {darkMode ? <IconSun /> : <IconMoon />}
                            </button>
                        </div>
                        
                        <div className="px-8 pb-6">
                            <div className="bg-brand-500/10 border border-brand-500/20 rounded-2xl p-5 flex items-center gap-4 backdrop-blur-md">
                                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-brand-400 to-blue-500 flex items-center justify-center text-white shadow-lg">
                                    <IconFlame />
                                </div>
                                <div>
                                    <p className="text-xs text-brand-600 dark:text-brand-400 font-bold uppercase tracking-wider">Current Streak</p>
                                    <p className="text-2xl font-extrabold">{tracking.streak} Days</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-2 space-y-2 overflow-y-auto">
                            <NavItem icon={<IconHome />} label="Dashboard" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                            <NavItem icon={<IconCamera />} label="Food Scanner" active={view === 'scanner'} onClick={() => setView('scanner')} />
                            <NavItem icon={<IconMessage />} label="AI Health Coach" active={view === 'coach'} onClick={() => setView('coach')} badge="Pro" />
                            <NavItem icon={<IconHeart />} label="Insights" active={view === 'insights'} onClick={() => setView('insights')} />
                            <NavItem icon={<IconUser />} label="Profile & Goals" active={view === 'profile'} onClick={() => setView('profile')} />
                        </nav>

                        <div className="p-6">
                            <div className="glass-panel rounded-2xl p-5 text-center relative overflow-hidden group cursor-pointer">
                                <div className="absolute top-0 right-0 w-24 h-24 bg-brand-400/20 rounded-full blur-2xl -mr-10 -mt-10 group-hover:bg-brand-400/40 transition"></div>
                                <p className="text-sm font-bold mb-1">NutriCare Premium</p>
                                <p className="text-xs text-gray-500 dark:text-gray-400 mb-3">Therapeutic Tracking.</p>
                                <p className="text-[10px] font-bold text-brand-600 dark:text-brand-400 uppercase tracking-widest">Made by Ewan</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="w-full min-h-screen p-4 sm:p-8 md:p-10 lg:px-16">
                        {/* Mobile Header */}
                        <div className="flex sm:hidden justify-between items-center mb-6 glass-panel p-4 rounded-2xl z-50 sticky top-4">
                            <div className="flex items-center gap-2">
                                <IconLogo />
                                <h1 className="text-xl font-bold tracking-tight text-gradient-premium">NutriCare</h1>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-1 text-brand-500 font-bold text-sm bg-brand-500/10 px-2 py-1 rounded-lg">
                                    <IconFlame /> {tracking.streak}
                                </div>
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full bg-black/5 dark:bg-white/10">
                                    {darkMode ? <IconSun /> : <IconMoon />}
                                </button>
                            </div>
                        </div>

                        <div className="animate-fade-in-up">
                            {view === 'onboarding' && <OnboardingView profile={profile} setProfile={setProfile} onSubmit={handleProfileSubmit} calculated={goalsCalculated} />}
                            {view === 'dashboard' && <DashboardView tracking={tracking} addWater={addWater} setView={setView} />}
                            {view === 'scanner' && <ScannerView setView={setView} setTracking={setTracking} profile={profile} triggerConfetti={triggerConfetti} />}
                            {view === 'coach' && <CoachView profile={profile} />}
                            {view === 'insights' && <InsightsView />}
                            {view === 'profile' && <ProfileView profile={profile} setProfile={setProfile} />}
                        </div>
                    </main>

                    {/* Bottom Navigation for Mobile */}
                    <nav className="sm:hidden fixed bottom-0 left-0 w-full glass-nav z-50 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                        <div className="flex justify-around items-center p-2">
                            <MobileNavItem icon={<IconHome />} active={view === 'dashboard'} onClick={() => setView('dashboard')} label="Home" />
                            <MobileNavItem icon={<IconCamera />} active={view === 'scanner'} onClick={() => setView('scanner')} label="Scan" special />
                            <MobileNavItem icon={<IconMessage />} active={view === 'coach'} onClick={() => setView('coach')} label="Coach" />
                            <MobileNavItem icon={<IconHeart />} active={view === 'insights'} onClick={() => setView('insights')} label="Insights" />
                        </div>
                    </nav>
                </div>
            );
        };

        const NavItem = ({ icon, label, active, onClick, badge }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-300 font-medium ${
                    active 
                    ? 'bg-gradient-to-r from-brand-500 to-blue-500 text-white shadow-lg shadow-brand-500/30 scale-[1.02]' 
                    : 'hover:bg-black/5 dark:hover:bg-white/5 text-slate-600 dark:text-slate-300 hover:scale-[1.01]'
                }`}
            >
                <div className="flex items-center space-x-4">
                    <span className={active ? 'text-white' : 'text-slate-400 dark:text-slate-500'}>{icon}</span>
                    <span className="text-[15px]">{label}</span>
                </div>
                {badge && (
                    <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider ${active ? 'bg-white/20' : 'bg-brand-500/10 text-brand-500'}`}>
                        {badge}
                    </span>
                )}
            </button>
        );

        const MobileNavItem = ({ icon, active, onClick, label, special }) => (
            <button onClick={onClick} className="flex flex-col items-center justify-center w-16 gap-1 relative">

                                    <span className="px-3 py-1 bg-blue-500/10 text-blue-700 dark:text-blue-400 text-[10px] font-black uppercase tracking-wider rounded-lg border border-blue-500/20">{result.digestion} Digestion</span>
                                </div>
                            </div>

                            <div className="bg-gradient-to-br from-brand-500/10 to-blue-500/10 border border-brand-500/20 p-5 rounded-2xl mb-8 flex gap-4 backdrop-blur-sm">
                                <div className="text-brand-500 mt-1"><IconLogo/></div>
                                <p className="text-[15px] text-slate-800 dark:text-slate-200 leading-relaxed font-medium">
                                    <strong className="text-brand-600 dark:text-brand-400 font-black">AI Insight:</strong> {result.insight}
                                </p>
                            </div>

                            <div className="grid grid-cols-3 gap-4 mb-10">
                                <div className="bg-white/50 dark:bg-black/20 p-5 rounded-2xl border border-slate-100 dark:border-white/5 text-center">
                                    <div className="text-2xl font-black text-blue-500">{result.protein}g</div>
                                    <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mt-2">Protein</div>
                                </div>
                                <div className="bg-white/50 dark:bg-black/20 p-5 rounded-2xl border border-slate-100 dark:border-white/5 text-center">
                                    <div className="text-2xl font-black text-amber-500">{result.carbs}g</div>
                                    <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mt-2">Carbs</div>
                                </div>
                                <div className="bg-white/50 dark:bg-black/20 p-5 rounded-2xl border border-slate-100 dark:border-white/5 text-center">
                                    <div className="text-2xl font-black text-rose-500">{result.fat}g</div>
                                    <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mt-2">Fat</div>
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <button onClick={() => setResult(null)} className="flex-1 py-4 bg-white/50 dark:bg-black/40 hover:bg-white dark:hover:bg-black/60 border border-slate-200 dark:border-white/10 text-slate-700 dark:text-slate-300 rounded-2xl font-bold transition text-lg">
                                    Cancel
                                </button>
                                <button onClick={confirmMeal} className="flex-[2] py-4 bg-brand-500 text-white rounded-2xl font-bold shadow-xl shadow-brand-500/30 btn-premium text-lg">
                                    Log {result.calories} kcal
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CoachView = ({ profile }) => {
            const [messages, setMessages] = useState([
                { id: 1, role: 'ai', text: `Hi! I'm your NutriCare Specialist. I know gaining weight with a sensitive stomach is a complex challenge. My goal is to help you find high-calorie, low-volume foods that don't cause any discomfort. How are you feeling today?` }
            ]);
            const [input, setInput] = useState('');
            const endRef = useRef(null);
            const [isTyping, setIsTyping] = useState(false);

            const sendMessage = (e) => {
                e.preventDefault();
                if(!input.trim()) return;

                const userMsg = { id: Date.now(), role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsTyping(true);

                setTimeout(() => {
                    let aiText = "I completely hear you. Sometimes it's best to drink your calories if solid food feels too heavy on your gut. Have you tried a simple shake with whole milk, protein powder, and a tablespoon of olive oil? It's over 400 calories and very easy to digest. You're doing amazing just by showing up. ❤️";
                    
                    if(input.toLowerCase().includes('full') || input.toLowerCase().includes('bloated')) {
                        aiText = "Feeling bloated is tough. Let's pause on the high-fiber foods for today. Try switching to simple carbs like white rice or liquid meals. Take a short walk to help digestion, and don't stress if you miss your surplus goal slightly today. Health is a marathon, not a sprint. 💪";
                    }
                    if(input.toLowerCase().includes('ideas') || input.toLowerCase().includes('eat')) {
                        aiText = "Here are 3 extremely easy-to-digest, calorie-dense ideas: <br/><br/>1. Macadamia nuts (high fat, low volume). <br/>2. Rice pudding made with whole milk. <br/>3. Bone broth cooked with extra butter and soft noodles. <br/><br/>Which of those sounds tolerable right now?";
                    }
                    
                    setMessages(prev => [...prev, { id: Date.now()+1, role: 'ai', text: aiText }]);
                    setIsTyping(false);
                }, 2000);
            };

            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, isTyping]);

            return (
                <div className="max-w-4xl mx-auto h-[88vh] flex flex-col pt-4">
                    <div className="glass-panel rounded-[3rem] overflow-hidden flex flex-col h-full shadow-2xl border-white/40 dark:border-white/10">
                        
                        <div className="p-6 sm:p-8 border-b border-slate-200/50 dark:border-white/5 bg-white/40 dark:bg-black/20 backdrop-blur-xl flex items-center justify-between z-10 shadow-sm">
                            <div className="flex items-center gap-5">
                                <div className="relative">
                                    <div className="w-14 h-14 rounded-[1.2rem] bg-gradient-to-br from-brand-400 to-blue-600 flex items-center justify-center text-white shadow-lg">
                                        <IconLogo />
                                    </div>
                                    <div className="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-white dark:border-[#09090b] rounded-full"></div>
                                </div>
                                <div>
                                    <h2 className="font-extrabold text-xl tracking-tight">NutriCare Clinical AI</h2>
                                    <p className="text-[11px] text-brand-600 dark:text-brand-400 font-black uppercase tracking-widest mt-1">Weight Gain & Gut Expert</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 sm:p-8 space-y-6 relative scroll-smooth">
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent to-brand-500/5 pointer-events-none"></div>
                            
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} relative z-10 animate-fade-in-up`}>
                                    {msg.role === 'ai' && (
                                        <div className="w-10 h-10 rounded-[1rem] bg-gradient-to-br from-brand-400 to-blue-600 flex-shrink-0 mr-4 flex items-center justify-center text-white mt-auto mb-2 shadow-md">
                                            <IconLogo />
                                        </div>
                                    )}
                                    <div className={`max-w-[85%] sm:max-w-[70%] rounded-[1.5rem] px-6 py-5 ${
                                        msg.role === 'user' 
                                        ? 'bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-br-sm shadow-xl' 
                                        : 'bg-white/90 dark:bg-black/60 backdrop-blur-md border border-slate-100 dark:border-white/5 rounded-bl-sm shadow-lg'
                                    }`}>
                                        <p className="text-[16px] leading-relaxed font-medium" dangerouslySetInnerHTML={{__html: msg.text}}></p>
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start relative z-10">
                                    <div className="w-10 h-10 rounded-[1rem] bg-gradient-to-br from-brand-400 to-blue-600 flex-shrink-0 mr-4 flex items-center justify-center text-white mt-auto mb-2 shadow-md">
                                        <IconLogo />
                                    </div>
                                    <div className="bg-white/90 dark:bg-black/60 backdrop-blur-md border border-slate-100 dark:border-white/5 rounded-[1.5rem] rounded-bl-sm px-6 py-5 shadow-lg flex items-center gap-2">
                                        <div className="w-2.5 h-2.5 bg-brand-500/50 rounded-full animate-bounce"></div>
                                        <div className="w-2.5 h-2.5 bg-brand-500/50 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                        <div className="w-2.5 h-2.5 bg-brand-500/50 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                    </div>
                                </div>
                            )}
                            <div ref={endRef} className="h-4" />
                        </div>

                        <form onSubmit={sendMessage} className="p-6 sm:p-8 bg-white/50 dark:bg-black/30 backdrop-blur-xl border-t border-slate-200/50 dark:border-white/5 z-10">
                            <div className="flex gap-4">
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={e => setInput(e.target.value)}
                                    placeholder="Tell me how your stomach feels or ask for meal ideas..." 
                                    className="flex-1 bg-white/80 dark:bg-black/50 border border-slate-200 dark:border-white/10 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20 rounded-[1.5rem] px-6 py-5 outline-none text-[16px] transition-all shadow-inner font-medium backdrop-blur-sm"
                                />
                                <button type="submit" disabled={!input.trim()} className="w-16 h-16 bg-brand-500 disabled:opacity-50 text-white rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-brand-500/30 transition-all transform hover:scale-105 active:scale-95 btn-premium">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const InsightsView = () => {
            const data = [
                { name: 'Week 1', weight: 55.0, target: 55.2 },
                { name: 'Week 2', weight: 55.3, target: 55.4 },
                { name: 'Week 3', weight: 55.4, target: 55.6 },
                { name: 'Week 4', weight: 55.8, target: 55.8 },
                { name: 'Week 5', weight: 56.1, target: 56.0 },
                { name: 'Week 6', weight: 56.4, target: 56.2 },
            ];

            return (
                <div className="max-w-5xl mx-auto pt-4 space-y-8">
                    <h2 className="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2">Health Insights</h2>
                    
                    <div className="glass-panel rounded-[3rem] p-8 sm:p-12 shadow-xl">
                        <div className="flex justify-between items-end mb-12">
                            <div>
                                <h3 className="text-2xl font-bold tracking-tight">Weight Trajectory</h3>
                                <p className="text-sm font-semibold text-brand-500 mt-1 uppercase tracking-wider">Steady, safe progression</p>
                            </div>
                            <div className="text-right">
                                <span className="text-4xl font-black text-slate-900 dark:text-white tracking-tighter">+1.4 kg</span>
                                <p className="text-xs text-slate-500 uppercase font-black tracking-widest mt-1">Past 6 Weeks</p>
                            </div>
                        </div>

                        <div className="h-64 w-full mt-4">
                            <CustomAreaChart data={data} />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="glass-panel rounded-[2.5rem] p-8">
                            <h3 className="font-extrabold text-xl mb-6 flex items-center gap-3"><IconLogo/> AI Report</h3>
                            <ul className="space-y-6">
                                <li className="flex gap-4 items-start">
                                    <div className="w-3 h-3 rounded-full bg-brand-500 mt-1.5 shadow-[0_0_10px_rgba(20,184,166,0.5)]"></div>
                                    <div>
                                        <p className="font-bold text-lg text-slate-900 dark:text-white">Consistent Surplus</p>
                                        <p className="text-sm text-slate-500 font-medium mt-1 leading-relaxed">You've hit your +400 kcal surplus goal 5 out of 7 days this week.</p>
                                    </div>
                                </li>
                                <li className="flex gap-4 items-start">
                                    <div className="w-3 h-3 rounded-full bg-blue-500 mt-1.5 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                                    <div>
                                        <p className="font-bold text-lg text-slate-900 dark:text-white">Digestion Improving</p>
                                        <p className="text-sm text-slate-500 font-medium mt-1 leading-relaxed">Switching to lower-volume liquid meals in the morning has correlated with fewer logged discomforts.</p>
                                    </div>
                                </li>
                            </ul>
                        </div>
                        <div className="glass-panel rounded-[2.5rem] p-8 bg-gradient-to-br from-brand-500 to-blue-600 text-white border-0 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                            <h3 className="font-extrabold text-xl mb-4 text-white/90">Milestone Unlocked!</h3>
                            <div className="flex items-center justify-center py-8">
                                <div className="w-32 h-32 bg-white/10 rounded-[2rem] flex items-center justify-center backdrop-blur-md border border-white/20 relative shadow-2xl transform rotate-3">
                                    <div className="absolute -top-4 -right-4 text-4xl animate-bounce">✨</div>
                                    <IconFlame size={60} className="text-yellow-300 drop-shadow-lg" />
                                </div>
                            </div>
                            <div className="text-center relative z-10">
                                <p className="font-black text-4xl tracking-tighter mb-2">14 Day Streak</p>
                                <p className="text-[15px] text-white/80 font-medium leading-relaxed">Consistency is the key to gaining healthy mass safely. You're doing incredible.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfileView = ({ profile, setProfile }) => (
            <div className="max-w-4xl mx-auto pt-4 space-y-8 pb-10">
                <h2 className="text-3xl sm:text-4xl font-extrabold tracking-tight">Profile Settings</h2>
                <div className="glass-panel rounded-[3rem] p-8 sm:p-12 shadow-xl">
                    <div className="flex flex-col sm:flex-row items-center sm:items-start gap-8 mb-10 pb-10 border-b border-slate-200 dark:border-white/10">
                        <div className="relative group cursor-pointer">
                            <div className="w-32 h-32 rounded-[2rem] bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-800 dark:to-slate-900 flex items-center justify-center text-slate-400 text-5xl shadow-inner border border-white/50 dark:border-white/5 transition-transform group-hover:scale-105">
                                <IconUser />
                            </div>
                            <div className="absolute -bottom-2 -right-2 w-10 h-10 bg-brand-500 rounded-[1rem] flex items-center justify-center text-white shadow-lg border-2 border-white dark:border-[#09090b]">
                                <IconCamera size={18} />
                            </div>
                        </div>
                        <div className="text-center sm:text-left mt-2">
                            <h3 className="text-4xl font-black tracking-tight mb-2">{profile.name || 'User'}</h3>
                            <p className="text-slate-500 font-semibold text-lg">{profile.age || 25} yrs • {profile.gender || 'Male'}</p>
                            <div className="mt-4 inline-flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-brand-500 to-blue-500 text-white rounded-full text-xs font-black uppercase tracking-widest shadow-md">
                                <IconShield size={14} /> Premium Therapeutic
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-8 gap-x-8">
                        <div className="bg-white/40 dark:bg-black/20 p-6 rounded-3xl border border-slate-100 dark:border-white/5 shadow-sm">
                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">Target Goal</p>
                            <p className="text-2xl font-black text-brand-600 dark:text-brand-400 capitalize tracking-tight">{profile.goal || 'Gain'} Weight</p>
                        </div>
                        <div className="bg-white/40 dark:bg-black/20 p-6 rounded-3xl border border-slate-100 dark:border-white/5 shadow-sm">
                            <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">Current Weight</p>
                            <p className="text-2xl font-black tracking-tight text-slate-900 dark:text-white">{profile.weight || 55} kg</p>
                        </div>
                        
                        <div className="col-span-1 sm:col-span-2 bg-gradient-to-br from-brand-500/5 to-blue-500/5 p-8 rounded-3xl border border-brand-500/20 shadow-sm relative overflow-hidden">
                            <IconLogo className="absolute -right-4 -bottom-4 opacity-5 w-48 h-48" />
                            <p className="text-xs font-black text-brand-600 dark:text-brand-400 uppercase tracking-widest mb-6 flex items-center gap-2"><IconActivity size={16}/> Clinical Profile</p>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 relative z-10">
                                <div>
                                    <p className="text-sm font-bold text-slate-500 mb-2">Health Conditions</p>
                                    <p className="text-lg text-slate-900 dark:text-white font-semibold leading-relaxed">{profile.conditions || 'None specified'}</p>
                                </div>
                                <div>
                                    <p className="text-sm font-bold text-slate-500 mb-2">Digestion Profile</p>
                                    <p className="text-lg text-slate-900 dark:text-white font-semibold capitalize">{profile.digestion || 'Sensitive'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="mt-10 pt-8 border-t border-slate-200 dark:border-white/10">
                        <button className="w-full py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl font-bold text-lg hover:scale-[1.01] transition-transform shadow-xl">
                            Edit Profile Parameters
                        </button>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
